<script>
    const brain = JSON.parse(document.getElementById('ai-brain-data').textContent);
    const chatFlow = document.getElementById('chat-flow');
    const userInput = document.getElementById('user-input');

    function renderMessage(text, isUser) {
        if(document.getElementById('greeting')) document.getElementById('greeting').style.display = 'none';
        const bubble = document.createElement('div');
        bubble.className = `message ${isUser ? 'user-query' : 'ai-response'}`;
        bubble.innerHTML = text;
        chatFlow.appendChild(bubble);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    // Levenshtein Distance Function for Matrix Typos / Spelling Mistakes
    function calculateLevenshtein(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j] + 1
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    // Khatarnak NLP Multi-Layer Engine
    function matchNLP(query) {
        // Cleaning query 
        const cleanQuery = query.toLowerCase().replace(/[^\w\s\+]/gi, '').trim();
        if (!cleanQuery) return "Neural transmission empty. Please input valid tokens.";

        // LAYER 1: Absolute Exact Match Matrix
        if (brain[cleanQuery]) return brain[cleanQuery];

        let bestMatch = null;
        let maxScore = 0;
        const stopwords = new Set(['is', 'what', 'who', 'the', 'are', 'you', 'of', 'in', 'to', 'for', 'am', 'my']);

        // LAYER 2: Advanced Word Proximity & Weight Scoring
        for (let key in brain) {
            let score = 0;
            const keyWords = key.split(' ');
            const queryWords = cleanQuery.split(' ');
            
            // Exact word matching sequence
            keyWords.forEach(word => {
                if (!stopwords.has(word) && word.length > 1) {
                    if (cleanQuery.includes(word)) {
                        score += 5; // High weight for exact core matching words
                    }
                }
            });

            // Index Sequence alignment bonus
            if (cleanQuery.indexOf(key) !== -1 || key.indexOf(cleanQuery) !== -1) {
                score += 10;
            }

            if (score > maxScore) {
                maxScore = score;
                bestMatch = brain[key];
            }
        }

        if (maxScore >= 5) return bestMatch;

        // LAYER 3: Fuzzy Logic & Levenshtein Matrix Matcher (Typo Protection System)
        let closestKey = null;
        let minDistance = Infinity;

        for (let key in brain) {
            // Check only meaningful query strings
            if(Math.abs(key.length - cleanQuery.length) <= 4) { 
                let distance = calculateLevenshtein(cleanQuery, key);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestKey = key;
                }
            }
        }

        // Adaptive limit based on phrase structure
        let permissibleDistance = Math.max(2, Math.floor(cleanQuery.length * 0.25));
        if (minDistance <= permissibleDistance && closestKey) {
            return brain[closestKey];
        }

        // LAYER 4: Dynamic Global System Fallback
        return "Pattern processed, but neural link could not find a precise match. Please clarify with English keywords, Master Pritam.";
    }

    function executeLogic() {
        const query = userInput.value.trim();
        if(!query) return;

        renderMessage(query, true);
        userInput.value = "";

        setTimeout(() => {
            let response = matchNLP(query);
            renderMessage(response, false);

            // Speech Core Unit
            const speech = new SpeechSynthesisUtterance(response.replace(/<[^>]*>/g, ''));
            speech.lang = 'en-UK';
            speech.rate = 1.0;
            window.speechSynthesis.speak(speech);
        }, 350); 
    }

    document.getElementById('send-btn').addEventListener('click', executeLogic);
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') executeLogic(); });
</script>
